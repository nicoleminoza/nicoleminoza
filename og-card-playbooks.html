<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--paper:#faf6f1;--ink:#241f1d;--soft:#5d534c;--faint:#a99d90;--rule:#e6dccf;--plum:#6b2c41;--terra:#c07a44;
    --display:"Newsreader",Georgia,serif;--sans:"Hanken Grotesk",sans-serif;--mono:"Spline Sans Mono",monospace;}
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);position:relative;overflow:hidden}
  .frame{position:absolute;inset:14px;border:1px solid var(--rule)}
  .pad{position:absolute;inset:84px}
  .eyebrow{font-family:var(--mono);font-weight:500;font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:var(--plum)}
  .mono-n{position:absolute;top:70px;right:84px;font-family:var(--display);font-weight:600;font-size:44px;color:var(--plum)}
  .title{font-family:var(--display);font-weight:500;font-size:104px;line-height:1;letter-spacing:-.02em;color:var(--ink);margin-top:34px}
  .title i{font-style:italic}
  .tagline{font-family:var(--sans);font-weight:400;font-size:32px;line-height:1.3;color:var(--soft);margin-top:30px;max-width:1010px}
  .accent{width:72px;height:3px;background:var(--terra);margin-top:28px}
  .plays{margin-top:46px}
  .play{display:flex;align-items:baseline;gap:24px;padding:14px 0;border-top:1px solid var(--rule)}
  .play:last-child{border-bottom:1px solid var(--rule)}
  .pi{font-family:var(--mono);font-weight:500;font-size:16px;color:var(--plum);width:34px}
  .pt{font-family:var(--display);font-weight:500;font-size:27px;color:var(--ink);flex:1}
  .pd{font-family:var(--mono);font-weight:500;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft)}
  .footer{position:absolute;left:84px;right:84px;bottom:50px;display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:16px;color:var(--soft)}
  .footer .r{color:var(--faint)}
</style></head>
<body>
  <div class="frame"></div>
  <div class="mono-n">N.</div>
  <div class="pad">
    <div class="eyebrow">Operating Playbooks &middot; Nicole Miñoza</div>
    <div class="title">Play<i>books</i></div>
    <div class="tagline">The examples are fonts. The decisions carry to any product.</div>
    <div class="accent"></div>
    <div class="plays">
      <div class="play"><span class="pi">01</span><span class="pt">Adoption without a mandate</span><span class="pd">Influence</span></div>
      <div class="play"><span class="pi">02</span><span class="pt">Proof before you ship</span><span class="pd">Measurement</span></div>
      <div class="play"><span class="pi">03</span><span class="pt">Two buyers, one capability</span><span class="pd">Positioning</span></div>
    </div>
  </div>
  <div class="footer"><span>nicoleminoza.com/playbooks</span><span class="r">Operating Playbooks &middot; June 2026</span></div>
</body></html>

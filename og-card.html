<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--paper:#faf6f1;--ink:#241f1d;--soft:#5d534c;--faint:#a99d90;--rule:#e6dccf;--plum:#6b2c41;--terra:#c07a44;
    --display:"Newsreader",Georgia,serif;--sans:"Hanken Grotesk",sans-serif;--mono:"Spline Sans Mono",monospace;}
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);position:relative;overflow:hidden}
  .frame{position:absolute;inset:14px;border:1px solid var(--rule)}
  .pad{position:absolute;inset:84px}
  .eyebrow{font-family:var(--mono);font-weight:500;font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:var(--plum)}
  .mono-n{position:absolute;top:70px;right:84px;font-family:var(--display);font-weight:600;font-size:44px;color:var(--plum)}
  .name{font-family:var(--display);font-weight:500;font-size:96px;line-height:1;letter-spacing:-.02em;color:var(--ink);margin-top:36px}
  .name i{font-style:italic}
  .tagline{font-family:var(--sans);font-weight:400;font-size:34px;line-height:1.3;color:var(--soft);margin-top:34px;max-width:1000px}
  .accent{width:72px;height:3px;background:var(--terra);margin-top:30px}
  .stats{display:flex;gap:84px;margin-top:54px}
  .num{font-family:var(--display);font-weight:500;font-size:64px;line-height:1;color:var(--plum)}
  .lab{font-family:var(--mono);font-weight:500;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin-top:14px}
  .footer{position:absolute;left:84px;right:84px;bottom:78px;display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:16px;color:var(--soft)}
  .footer .r{color:var(--faint)}
</style></head>
<body>
  <div class="frame"></div>
  <div class="mono-n">N.</div>
  <div class="pad">
    <div class="eyebrow">Product &amp; Product Marketing Executive</div>
    <div class="name">Nicole <i>Miñoza</i></div>
    <div class="tagline">I turn undervalued features into revenue, retention, and reach.</div>
    <div class="accent"></div>
    <div class="stats">
      <div><div class="num">+186%</div><div class="lab">Conversion lift</div></div>
      <div><div class="num">12M+</div><div class="lab">Adobe Fonts MAU</div></div>
      <div><div class="num">&#8722;66%</div><div class="lab">Lower churn</div></div>
    </div>
  </div>
  <div class="footer"><span>nicoleminoza.com</span><span class="r">Seattle, WA</span></div>
</body></html>
